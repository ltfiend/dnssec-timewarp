services:
  bind-auth:
    image: registry.devries.tv/nojem-bind:latest
    container_name: dnssec-lab-auth
    networks:
      lab:
        ipv4_address: 172.28.0.10
    ports:
      - "15353:53/udp"    # query from host with: dig @127.0.0.1 -p 15353 ...
      - "15353:53/tcp"
      - "19953:953/tcp"   # rndc from orchestrator
    volumes:
      # Shared faketime config — orchestrator writes, BIND reads.
      #
      # CRITICAL: this MUST be a directory bind mount, not a single-file
      # bind mount. Single-file bind mounts pin the container's view to
      # the inode at container-start time, so updates from the host never
      # reach BIND if the file is replaced via atomic rename. Mounting
      # the parent directory makes the path re-resolve dynamically inside
      # the container, which works with both in-place writes and renames.
      # Keeping the rc file in its own subdir (./runtime/clock/) keeps
      # the rest of ./runtime/ from leaking into /opt/lab/.
      - ./runtime/clock:/opt/lab
      # Zone data and key state files, so we can inspect them from the host.
      - ./runtime/bind-data:/var/lib/bind
      - ./runtime/bind-logs:/var/log/bind
      - ./docker/bind/named.conf:/etc/bind/named.conf:ro
      - ./docker/bind/example.test.db:/var/lib/bind/example.test.db:ro
      - ./runtime/rndc.key:/etc/bind/rndc.key:ro

networks:
  lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
