// Authoritative server running the zone under test.
// dnssec-policy does all the KSK/ZSK lifecycle work automatically;
// our job is to watch it progress through virtual time.

options {
    directory "/var/lib/bind";
    pid-file "/run/named/named.pid";
    listen-on    { any; };
    listen-on-v6 { any; };
    recursion no;
    allow-transfer { none; };

    // Aggressive logging of the dnssec signing pipeline is what makes
    // this whole exercise watchable.
    dnssec-validation no;   // we're authoritative, not validating
};

controls {
    // rndc from any address on the lab network; TSIG-protected in real
    // deployments but open here for simplicity.
    inet 0.0.0.0 port 953 allow { any; } keys { "rndc-key"; };
};

include "/etc/bind/rndc.key";

logging {
    channel dnssec_log {
        file "/var/log/bind/dnssec.log" versions 3 size 10m;
        severity debug 3;
        print-time iso8601;
        print-category yes;
        print-severity yes;
    };
    channel general_log {
        file "/var/log/bind/general.log" versions 3 size 10m;
        severity info;
        print-time iso8601;
        print-category yes;
    };
    category dnssec        { dnssec_log; };
    category dnssec-policy { dnssec_log; };  // BIND 9.19+ has this
    category zoneload      { dnssec_log; };
    category default       { general_log; };
};

// A fast-cycling policy so rollovers happen in reasonable virtual time.
// With x60 acceleration: lifetime 30d virtual = 12h real.
// For even faster demos, shrink lifetime and bump speed together.
dnssec-policy "lab-fast" {
    keys {
        ksk lifetime P60D    algorithm ECDSAP256SHA256;
        zsk lifetime P30D    algorithm ECDSAP256SHA256;
    };
    dnskey-ttl        PT1H;
    publish-safety    PT1H;
    retire-safety     PT1H;
    signatures-refresh    P5D;
    signatures-validity   P14D;
    signatures-validity-dnskey P14D;
    max-zone-ttl      P1D;
    zone-propagation-delay    PT5M;
    parent-propagation-delay  PT1H;
    parent-ds-ttl             PT1H;
};

zone "example.test" {
    type primary;
    file "/var/lib/bind/example.test.db";
    dnssec-policy "lab-fast";
    inline-signing yes;

    // The orchestrator plays the role of the parent zone's registrar.
    // When the orchestrator decides "the DS is now published", it tells
    // BIND via: rndc dnssec -checkds published example.test
    parental-agents { }; // empty = manual via rndc
};
